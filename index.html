<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors</title>
<link rel="stylesheet" href="RockPaperScissor.css">
</head>

<body>

<p class="title">Rock Paper Scissors</p>

<button class="move-button js-rock-button">
    <img src="rock.png" class="move-icon">
</button>

<button class="move-button js-paper-button">
    <img src="paper.jpeg" class="move-icon">
</button>

<button class="move-button js-scissors-button">
    <img src="scissor.png" class="move-icon">
</button>

<p class="js-result result"></p>

<p class="js-moves moves"></p>

<p class="js-score score"></p>

<button class="reset-button" onclick="resetScore()">
    Reset Score
</button>
<script src="RockPaperScissor.js"></script>
</body>
</html>
